# Configures the host's 40G PF (enp14s0f0np0) for the dpf-dummy-fabric VLAN.
# Persistent across reboots via netplan.
#
# Discovered during baseline benchmarking:
#  - Fabric subnet: 172.16.97.0/24 (untagged VLAN dpf-dummy-fabric / VLAN 497 on switch)
#  - Switch ports must be in 'switchport access vlan 497' mode (not L3 routed)
#  - Host PF needs an IP on the fabric subnet for any host-PF or pod-via-cilium-native test
#
# IP assignments (lab-specific; adjust if hosts differ):
#  - gpu1 (edge-7bf6f0...): 172.16.97.10/24
#  - gpu2 (gpu-sm02):       172.16.97.11/24
#
# Note: the IP per host is selected from a small whitelist baked into the script using
# the K8s node name. For different lab inventories, edit the case statement.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fabric-host-config
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fabric-host-config
  namespace: dpf-operator-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fabric-host-config
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fabric-host-config
subjects:
  - kind: ServiceAccount
    name: fabric-host-config
    namespace: dpf-operator-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fabric-host-config
  namespace: dpf-operator-system
  labels:
    app.kubernetes.io/component: fabric-host-config
spec:
  selector:
    matchLabels:
      app: fabric-host-config
  template:
    metadata:
      labels:
        app: fabric-host-config
    spec:
      serviceAccountName: fabric-host-config
      hostPID: true
      hostNetwork: true
      tolerations:
        - operator: Exists
      nodeSelector:
        feature.node.kubernetes.io/dpu-enabled: "true"
      containers:
        - name: nodeconf
          image: alpine/kubectl:latest
          command:
            - /bin/sh
            - -c
            - |
              set -u
              while true; do
                NODE=${KUBE_NODE_NAME:?}
                # Lab-specific MAC OR hostname → fabric IP map. Edit for your env.
                case "$NODE" in
                  edge-7bf6f060000000000000ac1f6b24deb2) IP=172.16.97.10 ;;
                  gpu-sm02)                              IP=172.16.97.11 ;;
                  *) IP="" ;;
                esac
                if [ -z "$IP" ]; then
                  echo "[$(date -Iseconds)] node $NODE not in fabric IP map; skipping"
                  sleep 60
                  continue
                fi

                NETPLAN_F=/host/etc/netplan/97-fabric-pf0.yaml
                if ! grep -q "$IP" "$NETPLAN_F" 2>/dev/null; then
                  cat > "$NETPLAN_F" <<EOF
              network:
                version: 2
                renderer: networkd
                ethernets:
                  enp14s0f0np0:
                    addresses: [$IP/24]
                    mtu: 9216
                    dhcp4: false
              EOF
                  chmod 600 "$NETPLAN_F"
                  echo "[$(date -Iseconds)] wrote netplan $NETPLAN_F (IP $IP)"
                  nsenter -t 1 -m -p -n bash -c 'netplan generate; netplan apply || true'
                fi

                # Verify in case netplan rolled back (e.g., 1G mgmt link took priority)
                if ! ip -4 addr show enp14s0f0np0 2>/dev/null | grep -q "$IP"; then
                  echo "[$(date -Iseconds)] netplan didn't take, runtime add"
                  ip link set enp14s0f0np0 up || true
                  ip addr replace $IP/24 dev enp14s0f0np0 || true
                fi
                sleep 60
              done
          env:
            - name: KUBE_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            privileged: true
          volumeMounts:
            - name: host-etc
              mountPath: /host/etc
            - name: host-proc
              mountPath: /host/proc
              readOnly: true
      volumes:
        - name: host-etc
          hostPath:
            path: /etc
            type: Directory
        - name: host-proc
          hostPath:
            path: /proc
            type: Directory
