apiVersion: provisioning.dpu.nvidia.com/v1alpha1
kind: DPUFlavor
metadata:
  name: hbn-ovn-v25.10.1
  namespace: dpf-operator-system
spec:
  bfcfgParameters:
  - UPDATE_ATF_UEFI=yes
  - UPDATE_DPU_OS=yes
  - WITH_NIC_FW_UPDATE=yes
  configFiles:
  - operation: override
    path: /etc/mellanox/mlnx-bf.conf
    permissions: '0644'
    raw: 'ALLOW_SHARED_RQ="no"

      IPSEC_FULL_OFFLOAD="no"

      ENABLE_ESWITCH_MULTIPORT="yes"

      '
  - operation: override
    path: /etc/mellanox/mlnx-ovs.conf
    permissions: '0644'
    raw: 'CREATE_OVS_BRIDGES="no"

      OVS_DOCA="yes"

      '
  - operation: override
    path: /etc/mellanox/mlnx-sf.conf
    permissions: '0644'
    raw: ''
  dpuMode: zero-trust
  grub:
    kernelParameters:
    - console=hvc0
    - console=ttyAMA0
    - earlycon=pl011,0x13010000
    - fixrttc
    - net.ifnames=0
    - biosdevname=0
    - iommu.passthrough=1
    - cgroup_no_v1=net_prio,net_cls
    - hugepagesz=2048kB
    - hugepages=3072
  nvconfig:
  - device: '*'
    parameters:
    - PF_BAR2_ENABLE=0
    - PER_PF_NUM_SF=1
    - PF_TOTAL_SF=20
    - PF_SF_BAR_SIZE=10
    - NUM_PF_MSIX_VALID=0
    - PF_NUM_PF_MSIX_VALID=1
    - PF_NUM_PF_MSIX=228
    - INTERNAL_CPU_MODEL=1
    - INTERNAL_CPU_OFFLOAD_ENGINE=0
    - SRIOV_EN=1
    - NUM_OF_VFS=46
    - LAG_RESOURCE_ALLOCATION=1
    - LINK_TYPE_P1=ETH
    - LINK_TYPE_P2=ETH
    - EXP_ROM_UEFI_x86_ENABLE=1
  ovs:
    rawConfigScript: "_ovs-vsctl() {\n  ovs-vsctl --no-wait --timeout 15 \"$@\"\n\
      }\n\n_ovs-vsctl set Open_vSwitch . other_config:doca-init=true\n_ovs-vsctl set\
      \ Open_vSwitch . other_config:dpdk-max-memzones=50000\n_ovs-vsctl set Open_vSwitch\
      \ . other_config:hw-offload=true\n_ovs-vsctl set Open_vSwitch . other_config:pmd-quiet-idle=true\n\
      _ovs-vsctl set Open_vSwitch . other_config:max-idle=20000\n_ovs-vsctl set Open_vSwitch\
      \ . other_config:max-revalidator=5000\n_ovs-vsctl --if-exists del-br ovsbr1\n\
      _ovs-vsctl --if-exists del-br ovsbr2\n_ovs-vsctl --may-exist add-br br-sfc\n\
      _ovs-vsctl set bridge br-sfc datapath_type=netdev\n_ovs-vsctl set bridge br-sfc\
      \ fail_mode=secure\n_ovs-vsctl --may-exist add-port br-sfc p0\n_ovs-vsctl set\
      \ Interface p0 type=dpdk\n_ovs-vsctl set Interface p0 mtu_request=9216\n_ovs-vsctl\
      \ set Port p0 external_ids:dpf-type=physical\n_ovs-vsctl --may-exist add-port\
      \ br-sfc p1\n_ovs-vsctl set Interface p1 type=dpdk\n_ovs-vsctl set Interface\
      \ p1 mtu_request=9216\n_ovs-vsctl set Port p1 external_ids:dpf-type=physical\n\
      _ovs-vsctl --may-exist add-br br-hbn\n_ovs-vsctl set bridge br-hbn datapath_type=netdev\n\
      _ovs-vsctl set bridge br-hbn fail_mode=secure\n      _ovs-vsctl --may-exist\
      \ add-br br-ovn-ext\n      _ovs-vsctl set bridge br-ovn-ext datapath_type=netdev\n\
      \      _ovs-vsctl set bridge br-ovn-ext fail_mode=secure\n"

