apiVersion: v1
kind: ServiceAccount
metadata:
  name: dpu-use-case-labeler
  namespace: dpf-operator-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dpu-use-case-labeler
rules:
  - apiGroups: ["provisioning.dpu.nvidia.com"]
    resources: ["dpunodes"]
    verbs: ["get", "list", "watch", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dpu-use-case-labeler
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: dpu-use-case-labeler
subjects:
  - kind: ServiceAccount
    name: dpu-use-case-labeler
    namespace: dpf-operator-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dpu-use-case-labeler
  namespace: dpf-operator-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dpu-use-case-labeler
  template:
    metadata:
      labels:
        app: dpu-use-case-labeler
    spec:
      serviceAccountName: dpu-use-case-labeler
      containers:
        - name: labeler
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - -c
            - |
              while true; do
                kubectl label dpunodes -n dpf-operator-system --all 'dpu/use-case=hbn' --overwrite >/dev/null 2>&1 || true
                sleep 30
              done
