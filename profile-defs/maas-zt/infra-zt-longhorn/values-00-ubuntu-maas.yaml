kubeadmconfig:
  preKubeadmCommands:
    - 'echo "====> Applying pre Kubeadm commands"'
    # Force specific IP address as the Node InternalIP for kubelet
    - |
      apt update && apt install -y grepcidr
      NETWORKS="{{ .spectro.var.K8sNodeCIDR }}"
      IPS=$(hostname -I)
      for IP in $IPS
      do
        echo "$IP" | grepcidr "$NETWORKS" >/dev/null && echo " --node-ip=$IP" >> /etc/default/kubelet
        if [ $? -eq 0 ]; then break; fi
      done
    # Install nfs-common for Longhorn
    - apt install -y nfs-common
    # Update CA certs
    - update-ca-certificates
  postKubeadmCommands:
    - 'echo "====> Applying post Kubeadm commands"'
    # Tag CP nodes for Longhorn storage
    - |
      if test -f /etc/kubernetes/admin.conf; then
        kubectl annotate node $(hostname) node.longhorn.io/default-node-tags='["storage"]' --kubeconfig /etc/kubernetes/admin.conf
      fi
    # v6: label the CP node with its OVN-K single-node-zone name AT BOOTSTRAP.
    # ovnkube-single-node-zone mode's get_node_zone() reads k8s.ovn.org/zone-name;
    # without it ovnkube-node CrashLoops and the CP never goes Ready. Doing this
    # here (postKubeadm, admin.conf) beats the chicken-egg where the addon-layer
    # zone-labeler DaemonSet (install-priority 30) can't run until the CP is
    # already Ready. Retry until the apiserver is reachable. CP only (admin.conf
    # exists only on the control-plane); workers are labelled by the addon
    # host-ovnk-zone-labeler DaemonSet (hostNetwork -> runs on NotReady workers)
    # once the CP is up. NodeRestriction blocks a worker kubelet from setting a
    # k8s.ovn.org/* label on itself, so worker self-labelling is not possible here.
    # v19 FIX (papercut #2): label by the ACTUAL registered node name, not
    # $(hostname). The CP's k8s node name (what ovnkube reads for the zone) may
    # differ from the OS hostname (case/FQDN/override); labelling $(hostname)
    # then silently no-ops all 60 retries and the CP never goes Ready. Read the
    # node object's real name and label THAT.
    - |
      if test -f /etc/kubernetes/admin.conf; then
        export KUBECONFIG=/etc/kubernetes/admin.conf
        for i in $(seq 1 90); do
          NODE=$(kubectl get nodes -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
          if [ -n "$NODE" ]; then
            kubectl label node "$NODE" k8s.ovn.org/zone-name="$NODE" --overwrite && \
              echo "labeled CP node $NODE with zone-name" && break
          fi
          sleep 5
        done
      fi
