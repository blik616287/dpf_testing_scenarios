apiVersion: v1
kind: Pod
metadata:
  name: doca-hbn
  namespace: kube-system
spec:
  hostNetwork: true
  hostPID: true
  restartPolicy: Always
  containers:
  - name: doca-hbn
    image: nvcr.io/nvidia/doca/doca_hbn:3.2.1-doca3.2.1
    imagePullPolicy: IfNotPresent
    securityContext:
      privileged: true
      capabilities:
        add:
        - NET_ADMIN
        - SYS_ADMIN
        - SYS_PTRACE
        - NET_RAW
        - IPC_LOCK
        - SYS_NICE
        - SYS_RAWIO
        - SYS_RESOURCE
    resources:
      requests:
        memory: "4Gi"
        hugepages-2Mi: "2Gi"
      limits:
        memory: "8Gi"
        hugepages-2Mi: "2Gi"
    volumeMounts:
    - name: config-data
      mountPath: /tmp/config-data
    - name: dev-shm
      mountPath: /dev/shm
    - name: hugepages
      mountPath: /hugepages
    - name: var-log
      mountPath: /var/log/hbn
    - name: var-support
      mountPath: /var/support
    - name: sys
      mountPath: /sys
    - name: lib-modules
      mountPath: /lib/modules
      readOnly: true
    - name: doca-runtime
      mountPath: /opt/mellanox/doca
      readOnly: true
  volumes:
  - name: config-data
    hostPath:
      path: /var/lib/hbn/config-data
      type: DirectoryOrCreate
  - name: dev-shm
    emptyDir:
      medium: Memory
      sizeLimit: 256Mi
  - name: hugepages
    emptyDir:
      medium: HugePages-2Mi
  - name: var-log
    hostPath:
      path: /var/log/hbn
      type: DirectoryOrCreate
  - name: var-support
    hostPath:
      path: /var/support
      type: DirectoryOrCreate
  - name: sys
    hostPath:
      path: /sys
      type: Directory
  - name: lib-modules
    hostPath:
      path: /lib/modules
      type: Directory
  - name: doca-runtime
    hostPath:
      path: /opt/mellanox/doca
      type: DirectoryOrCreate
