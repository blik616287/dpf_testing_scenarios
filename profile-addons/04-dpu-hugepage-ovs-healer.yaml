apiVersion: v1
kind: Namespace
metadata:
  name: dpu-host-prep
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: hugepage-ovs-healer
  namespace: dpu-host-prep
spec:
  selector:
    matchLabels:
      app: hugepage-ovs-healer
  template:
    metadata:
      labels:
        app: hugepage-ovs-healer
    spec:
      hostPID: true
      hostNetwork: true
      tolerations:
        - operator: Exists
      containers:
        - name: healer
          image: busybox:1.36
          securityContext:
            privileged: true
          command: ["/bin/sh", "-c"]
          args:
            - |
              while :; do
                want=$(grep -oE 'hugepages=[0-9]+' /host/boot/grub/grub.cfg 2>/dev/null | head -1 | cut -d= -f2)
                want=${want:-3072}
                cur=$(cat /host/sys/kernel/mm/hugepages/hugepages-2048kB/nr_hugepages 2>/dev/null)
                if [ "$cur" = "0" ] && [ -n "$want" ]; then
                  echo "$(date -Iseconds) allocating $want 2MB hugepages"
                  echo "$want" > /host/sys/kernel/mm/hugepages/hugepages-2048kB/nr_hugepages
                fi
                if ! nsenter -t 1 -m -u -i -n -p systemctl is-active --quiet ovs-vswitchd 2>/dev/null; then
                  if [ -S /host/var/run/openvswitch/db.sock ]; then
                    echo "$(date -Iseconds) ovs-vswitchd not active; restarting openvswitch-switch"
                    nsenter -t 1 -m -u -i -n -p systemctl reset-failed ovs-vswitchd openvswitch-switch 2>/dev/null
                    nsenter -t 1 -m -u -i -n -p systemctl start openvswitch-switch 2>/dev/null
                  fi
                fi
                sleep 60
              done
          volumeMounts:
            - name: host
              mountPath: /host
              mountPropagation: HostToContainer
      volumes:
        - name: host
          hostPath:
            path: /
